services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: expert17025
      POSTGRES_PASSWORD: expert17025
      POSTGRES_DB: expert17025
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expert17025"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://expert17025:expert17025@postgres:5432/expert17025
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      GIGACHAT_CREDENTIALS: ${GIGACHAT_CREDENTIALS:-}
      EMBEDDING_MODEL: text-embedding-3-small
      KNOWLEDGE_RELEVANCE_THRESHOLD: "0.85"
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
